<style>
/* ═══════════════════════════════════════════════
   CSS.html v3.0 — Bento Grid Glassmorphism 2026
   + Catalog Card Styles
═══════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap');

:root {
  --primary:#1565C0; --primary-light:#42A5F5; --primary-pale:#E3F2FD;
  --accent:#0288D1;  --accent2:#00BCD4;
  --success:#43A047; --warning:#FB8C00; --danger:#E53935;
  --soft-rose:#FFEBEE;
  --glass:rgba(255,255,255,0.72);
  --glass-border:rgba(255,255,255,0.55);
  --shadow:0 8px 32px rgba(21,101,192,0.13);
  --shadow-md:0 12px 40px rgba(21,101,192,0.18);
  --shadow-lg:0 20px 60px rgba(21,101,192,0.22);
  --radius:24px; --radius-sm:14px;
  --font:'Sarabun',sans-serif; --font-head:'Prompt',sans-serif;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:var(--font);
  background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 35%,#E1F5FE 60%,#F0F4FF 100%);
  min-height:100vh;color:#1a2a4a;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(66,165,245,0.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(0,188,212,0.14) 0%,transparent 70%);
  z-index:0;pointer-events:none;
}

/* ── Glass Card ─────────────────────────────── */
.glass-card{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border:1.5px solid var(--glass-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  position:relative;z-index:1;
}

/* ── Header ─────────────────────────────────── */
.app-header{
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1.5px solid var(--glass-border);
  padding:0 20px;height:66px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 24px rgba(21,101,192,0.09);gap:10px;
}
.header-brand{display:flex;align-items:center;gap:11px;flex-shrink:0}
.header-logo{width:44px;height:44px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(21,101,192,0.25))}
.header-title{font-family:var(--font-head);font-size:0.98rem;font-weight:700;color:var(--primary);line-height:1.2}
.header-subtitle{font-size:0.68rem;color:var(--accent);font-weight:500}

/* ── Nav Tabs ───────────────────────────────── */
.nav-tabs{display:flex;gap:3px;background:rgba(227,242,253,0.7);border-radius:50px;padding:4px;flex-wrap:wrap}
.nav-tab{padding:7px 13px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-size:0.8rem;font-weight:600;color:#5577aa;background:transparent;transition:all 0.25s;white-space:nowrap}
.nav-tab.active{background:var(--primary);color:white;box-shadow:0 4px 16px rgba(21,101,192,0.35)}
.nav-tab:hover:not(.active){background:rgba(255,255,255,0.8);color:var(--primary)}

/* ── Main ───────────────────────────────────── */
.app-main{padding:22px;max-width:1360px;margin:0 auto;position:relative;z-index:1}
.page{display:none;animation:fadeSlide 0.3s ease}
.page.active{display:block}
@keyframes fadeSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Stat Cards ─────────────────────────────── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:18px}
.stat-card{padding:18px 20px;border-radius:var(--radius);display:flex;align-items:center;gap:13px;position:relative;overflow:hidden;transition:transform 0.25s,box-shadow 0.25s}
.stat-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:var(--shadow-lg)}
.stat-card::after{content:'';position:absolute;top:-30%;right:-20%;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.18)}
.stat-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;flex-shrink:0;background:rgba(255,255,255,0.28)}
.stat-value{font-family:var(--font-head);font-size:1.85rem;font-weight:700;line-height:1}
.stat-label{font-size:0.76rem;opacity:0.88;margin-top:3px}
.stat-blue{background:linear-gradient(135deg,#1565C0,#42A5F5);color:white}
.stat-cyan{background:linear-gradient(135deg,#0277BD,#00BCD4);color:white}
.stat-green{background:linear-gradient(135deg,#2E7D32,#66BB6A);color:white}
.stat-orange{background:linear-gradient(135deg,#E65100,#FFA726);color:white}
.stat-purple{background:linear-gradient(135deg,#6A1B9A,#AB47BC);color:white}

/* ── Bento ──────────────────────────────────── */
.bento-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.bento-grid{grid-template-columns:1fr}}

/* ── Section Title ──────────────────────────── */
.section-title{font-family:var(--font-head);font-weight:700;font-size:0.96rem;color:var(--primary);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chart-wrap{padding:18px}
.overdue-wrap{padding:18px;max-height:360px;overflow-y:auto}
.overdue-row{padding:10px 13px;border-radius:12px;margin-bottom:7px;background:var(--soft-rose);border-left:4px solid var(--danger);font-size:0.82rem}
.overdue-name{font-weight:700;color:#b71c1c}
.overdue-detail{color:#c62828;font-size:0.77rem;margin-top:2px}

/* ── Real-time badge ────────────────────────── */
.rt-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(67,160,71,0.12);color:var(--success);padding:3px 9px;border-radius:50px;font-size:0.72rem;font-weight:600}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

/* ── Forms ──────────────────────────────────── */
.form-section{padding:22px}
.form-title{font-family:var(--font-head);font-size:1.03rem;font-weight:700;color:var(--primary);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:680px){.form-grid{grid-template-columns:1fr}}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group.full{grid-column:1/-1}
label{font-size:0.81rem;font-weight:600;color:#3a5080}
input,select,textarea{padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid #BBDEFB;background:rgba(255,255,255,0.85);font-family:var(--font);font-size:0.87rem;color:#1a2a4a;transition:border-color 0.2s,box-shadow 0.2s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary-light);box-shadow:0 0 0 3px rgba(66,165,245,0.15)}

/* ── Toggle ─────────────────────────────────── */
.toggle-group{display:flex;background:rgba(227,242,253,0.7);border-radius:50px;padding:4px;width:fit-content;margin-bottom:16px}
.toggle-btn{padding:8px 18px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-weight:600;font-size:0.85rem;transition:all 0.22s;color:#5577aa;background:transparent}
.toggle-btn.active{background:var(--primary);color:white;box-shadow:0 4px 14px rgba(21,101,192,0.3)}

/* ── Item Row (borrow) ──────────────────────── */
.item-row{display:grid;grid-template-columns:2fr 1fr auto;gap:9px;align-items:end;margin-bottom:9px;padding:12px;background:rgba(227,242,253,0.5);border-radius:13px;border:1.5px solid rgba(187,222,251,0.6)}

/* ── Buttons ────────────────────────────────── */
.btn{padding:9px 20px;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:0.87rem;position:relative;overflow:hidden;transition:transform 0.2s,box-shadow 0.2s;display:inline-flex;align-items:center;gap:7px}
.btn::after{content:'';position:absolute;top:50%;left:-60%;width:40%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.35),transparent);transform:translateY(-50%) skewX(-20deg);transition:left 0.5s}
.btn:hover::after{left:130%}
.btn:hover{transform:translateY(-2px) scale(1.02)}
.btn:active{transform:scale(0.97)}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;box-shadow:0 6px 20px rgba(21,101,192,0.28)}
.btn-success{background:linear-gradient(135deg,#2E7D32,#66BB6A);color:white;box-shadow:0 6px 18px rgba(46,125,50,0.25)}
.btn-danger {background:linear-gradient(135deg,#C62828,#EF5350);color:white;box-shadow:0 6px 18px rgba(198,40,40,0.25)}
.btn-outline{background:white;color:var(--primary);border:2px solid var(--primary-light);box-shadow:none}
.btn-sm{padding:6px 13px;font-size:0.77rem}
.btn-icon{width:32px;height:32px;padding:0;border-radius:50%;justify-content:center;font-size:0.95rem}

/* ── Signature ──────────────────────────────── */
.sig-wrap{border:2px dashed #90CAF9;border-radius:16px;overflow:hidden;background:white}
#signatureCanvas{display:block;cursor:crosshair;touch-action:none}
.sig-actions{display:flex;gap:8px;margin-top:8px}

/* ── Table ──────────────────────────────────── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:0.83rem}
thead th{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;padding:10px 12px;text-align:left;font-family:var(--font-head);font-weight:600;white-space:nowrap}
thead th:first-child{border-radius:12px 0 0 0}
thead th:last-child{border-radius:0 12px 0 0}
tbody tr{border-bottom:1px solid rgba(187,222,251,0.4);transition:background 0.15s}
tbody tr:hover{background:rgba(227,242,253,0.5)}
tbody td{padding:9px 12px;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:50px;font-size:0.73rem;font-weight:700}
.badge-active{background:#E3F2FD;color:#1565C0}
.badge-partial{background:#FFF3E0;color:#E65100}
.badge-done{background:#E8F5E9;color:#2E7D32}

/* ── Search ─────────────────────────────────── */
.search-bar{display:flex;gap:9px;align-items:center;margin-bottom:13px;flex-wrap:wrap}
.search-input{flex:1;min-width:170px;padding:8px 14px;border-radius:50px;border:1.5px solid #BBDEFB;background:rgba(255,255,255,0.85);font-family:var(--font);font-size:0.85rem;outline:none;transition:box-shadow 0.2s}
.search-input:focus{box-shadow:0 0 0 3px rgba(66,165,245,0.15);border-color:var(--primary-light)}

/* ── Upload ─────────────────────────────────── */
.upload-area{border:2px dashed #90CAF9;border-radius:16px;padding:18px;text-align:center;cursor:pointer;transition:background 0.2s;background:rgba(255,255,255,0.6)}
.upload-area:hover{background:rgba(227,242,253,0.7)}
.upload-preview{max-width:100%;max-height:150px;border-radius:10px;margin-top:10px}

/* ══════════════════════════════════════════════
   CATALOG STYLES
══════════════════════════════════════════════ */
.catalog-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
  margin-top:16px;
}

.catalog-card{
  border-radius:20px;
  overflow:hidden;
  transition:transform 0.28s cubic-bezier(.4,0,.2,1),box-shadow 0.28s;
  cursor:pointer;
  position:relative;
}
.catalog-card:hover{
  transform:translateY(-6px) scale(1.025);
  box-shadow:var(--shadow-lg);
}

/* Image area */
.cat-img-wrap{
  width:100%;
  height:180px;
  background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
  position:relative;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.cat-img{width:100%;height:100%;object-fit:cover;transition:transform 0.4s}
.catalog-card:hover .cat-img{transform:scale(1.07)}
.cat-img-placeholder{font-size:3.5rem;opacity:0.4}

/* Stock bar */
.cat-stock-bar{
  position:absolute;bottom:0;left:0;right:0;
  height:5px;background:rgba(0,0,0,0.1);
}
.cat-stock-fill{height:100%;border-radius:0 3px 3px 0;transition:width 0.5s}

/* Category chip */
.cat-chip{
  position:absolute;top:10px;left:10px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(8px);
  padding:3px 10px;border-radius:50px;
  font-size:0.7rem;font-weight:700;color:var(--primary);
}

/* Upload overlay */
.cat-upload-btn{
  position:absolute;top:10px;right:10px;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);
  border:none;border-radius:50%;width:32px;height:32px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:0.9rem;
  transition:background 0.2s,transform 0.2s;
  opacity:0;
}
.catalog-card:hover .cat-upload-btn{opacity:1}
.cat-upload-btn:hover{background:var(--primary);color:white;transform:scale(1.1)}

/* Card Body */
.cat-body{padding:14px 16px 16px}
.cat-name{font-family:var(--font-head);font-weight:700;font-size:0.95rem;color:#1a2a4a;margin-bottom:4px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-asset{font-size:0.73rem;color:#7a9abb;margin-bottom:10px}

/* Stock indicator */
.cat-stock-row{display:flex;justify-content:space-between;align-items:center}
.cat-stock-label{font-size:0.75rem;color:#5577aa}
.cat-stock-count{font-family:var(--font-head);font-size:1.15rem;font-weight:700}
.cat-available{color:var(--success)}
.cat-low{color:var(--warning)}
.cat-empty{color:var(--danger)}

/* Cat actions */
.cat-actions{display:flex;gap:6px;margin-top:12px}
.cat-btn{flex:1;padding:7px 0;border-radius:50px;border:none;cursor:pointer;font-family:var(--font);font-weight:700;font-size:0.78rem;transition:all 0.2s;text-align:center}
.cat-btn-borrow{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:white;box-shadow:0 4px 12px rgba(21,101,192,0.25)}
.cat-btn-borrow:hover{transform:translateY(-2px)}
.cat-btn-edit{background:white;color:var(--primary);border:1.5px solid var(--primary-light)}
.cat-btn-edit:hover{background:var(--primary-pale)}

/* Catalog view toggle */
.view-toggle{display:flex;background:rgba(227,242,253,0.7);border-radius:50px;padding:3px;gap:2px}
.view-btn{padding:6px 12px;border-radius:50px;border:none;cursor:pointer;font-size:0.8rem;background:transparent;color:#5577aa;transition:all 0.2s;font-family:var(--font)}
.view-btn.active{background:var(--primary);color:white;box-shadow:0 3px 10px rgba(21,101,192,0.3)}

/* No image state */
.cat-no-img-label{font-size:0.73rem;color:#90CAF9;margin-top:4px;text-align:center}

/* ── Return ──────────────────────────────────── */
.ret-qty-input{width:64px!important;padding:5px 7px!important;text-align:center}

/* ── Loader ─────────────────────────────────── */
.loader-overlay{position:fixed;inset:0;background:rgba(227,242,253,0.75);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px}
.loader-spinner{width:44px;height:44px;border-radius:50%;border:4px solid rgba(21,101,192,0.15);border-top-color:var(--primary);animation:spin 0.7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-family:var(--font-head);color:var(--primary);font-size:0.88rem}

/* ══ PRINT ═══════════════════════════════════ */
@media print{
  .app-header,.app-main,footer,.loader-overlay{display:none!important}
  #printArea{display:block!important;padding:12mm 18mm}
}
#printArea{display:none;font-family:'Sarabun',sans-serif;color:#000}
.print-logo{width:65px;height:65px;object-fit:contain}
.print-header{text-align:center;margin-bottom:12px}
.print-school{font-size:14pt;font-weight:700;margin:3px 0}
.print-doc-title{font-size:13pt;font-weight:700;margin:3px 0}
.print-year{font-size:11.5pt;margin:3px 0}
.print-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:10pt}
.print-table th,.print-table td{border:1px solid #333;padding:5px 7px;vertical-align:middle}
.print-table th{background:#BBDEFB;font-weight:700;text-align:center}
.print-table td{text-align:center}
.print-table td.left{text-align:left}
.sig-section{margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:50px}
.sig-box{text-align:center}
.sig-img{max-width:170px;max-height:65px}
.sig-line{border-top:1px solid #333;margin-top:5px;padding-top:4px;font-size:10.5pt}

/* ── Modal ──────────────────────────────────── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:200;display:none;align-items:center;justify-content:center}
.modal-box{width:min(540px,95vw);padding:24px;max-height:90vh;overflow-y:auto}

/* ── Footer ─────────────────────────────────── */
.app-footer{background:linear-gradient(135deg,var(--primary),#0D47A1);color:rgba(255,255,255,0.92);text-align:center;padding:14px 20px;font-size:0.77rem;font-family:var(--font);position:relative;z-index:1;margin-top:34px}

/* ── Responsive ─────────────────────────────── */
@media(max-width:640px){
  .app-header{padding:0 10px;height:auto;padding-top:7px;padding-bottom:7px;flex-wrap:wrap}
  .nav-tabs{gap:2px}
  .nav-tab{padding:6px 9px;font-size:0.73rem}
  .app-main{padding:10px}
  .catalog-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
  .cat-img-wrap{height:140px}
}
</style>
